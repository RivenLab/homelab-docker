services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - proxy
      - docker-proxynet
    environment:
      - TZ=${timezone}
      - TRAEFIK_DASHBOARD_CREDENTIALS=${dashboard_credentials}
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.entrypoints=https-internal
      - traefik.http.routers.api.rule=Host(`${app_domain}`)
      - traefik.http.routers.api.service=api@internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${app_data_path}/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${app_data_path}/logs:/logs
      - ${app_data_path}/conf.d:/etc/traefik/conf.d:ro
      - ${app_data_path}/certs:/etc/traefik/certs:ro   # <-- add this
    security_opt:
      - no-new-privileges:true

  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:1.26.2
    container_name: socket-proxy
    environment:
      - CONTAINERS=1
      - EVENTS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-proxynet
    restart: always
    read_only: true
    tmpfs:
      - /run

networks:
  proxy:
    external: true
  docker-proxynet:
    external: true
