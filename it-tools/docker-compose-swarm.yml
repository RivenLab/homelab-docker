version: '3.8'

services:
  it-tools:
    image: corentinth/it-tools:latest
    networks:
      - web
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.it-tools.rule=Host(`${app_domain}`)
        - traefik.http.services.it-tools.loadbalancer.server.port=80
        - traefik.docker.network=web

networks:
  web:
    external: true
